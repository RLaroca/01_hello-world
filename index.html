<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        header{
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            width: 100vw;
            height: 5vh;
            font-size: 1.5rem;
            font-weight: 600;
            color: #555;
            justify-content: center;
            padding: 20px;
            background-color: white;
            z-index: 1;
        }

        body{
            width: 100vw;
            height: 95vh;
            padding-top: 5vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hello-world{
            width: 50%;
            display: flex;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #333;
            text-wrap: nowrap;
            transition: color 0.3s ease-in-out, font-size 0.3s ease-in-out;
        }

        .hello-world:hover{
            display: flex;
            color: #007bff; 
            font-size: 6rem; 
            cursor: pointer;
            width: 100vw;
            animation:fadeInOutColor 3s infinite alternate;
            transform-origin: center;
            text-wrap: nowrap;
        }


        @keyframes fadeInOutColor{
             0% {
                color: green;
             }
            50% {
                color: blue;
            }
            100% {
                color: red;
            }
        }
    </style>
</head>

<body>
    <header>That's the curse-break of programming!</header>
    <p class="hello-world">HELLO WORLD!</p>
</body>

</html>
