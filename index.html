<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hello-world{
            width: 100%;
            display: flex;
            justify-content: center;
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #333;
            text-wrap: nowrap;
            transition: color 0.3s ease-in-out, font-size 0.3s ease-in-out;
        }

        .hello-world:hover{
            display: flex;
            color: #007bff; 
            font-size: 10rem; 
            cursor: pointer;
            width: 150vw;
            animation: fadeInOut 1s infinite alternate;
            transform-origin: center;
            text-wrap: nowrap;
        }

        @keyframes fadeInOut {
            0% {opacity: 0.25;}
            100% {opacity: 1;}
        }
    </style>
</head>

<body>
    <p class="hello-world">HELLO WORLD!</p>
</body>

</html>
